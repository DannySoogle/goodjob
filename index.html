            <!-- Article Body -->
            <div class="article-content">
                <p>Yesterday, Google <a href="#">announced</a> that it is giving mobile developers more freedom in how they choose to handle transactions.</p>
                <p>The policy change attempts to settle a years-long antitrust lawsuit filed by developer Epic Games, who accused the tech giant of anticompetitive behavior after it banned Fortnite – Epic’s immensely popular multiplayer battle royale game – from the Play Store in 2020.</p>
                
                <h3>What's the Scoop?</h3>
                <ul>
                    <li><strong>Potential Resolution:</strong> Google and Epic Games have proposed a joint settlement to resolve their long-running antitrust case. Under the proposed settlement (which remains subject to Court approval), Google would agree to allow developers to accept external payments, implement a registration program for verified apps, and lower fees for developers.</li>
                    <li><strong>Uncertain Outcome:</strong> Although Google's proposed measures could help foster competition among developers and payments providers, they may not do enough level the playing field. Despite support from both parties, <em>Ars Technica </em><a href="#">reports</a> that the judge overseeing the case is worried the settlement may be a “sweetheart deal,” which benefits Epic more than it does other developers.</li>
                </ul>

                <h3>What's the Take:</h3>
                <p>Not only does a settlement between Google and Epic Games clear the way for Fortnite's return to the Play Store, it may also open the doors for developers to accept crypto payments.</p>
                <p>Last year, Apple <a href="#">settled</a> a similar lawsuit with Epic Games for de-platforming Fortnite because of its support for external payments. The terms of that deal expressly prohibited Apple from imposing commissions on off-app purchases and controlling how developers communicate with their users.</p>
                <p>Crypto payments are acclaimed for their virtually instant speeds and extremely low costs. While mobile application developers had been previously restricted to using approved high-fee payment channels, Epic Game's string of legal victories is helping clear the way for developers to use whatever methods they please!</p>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const popup = document.getElementById("scrollAuthPopup");
            const popupCard = document.getElementById("popupCard");
            let isShown = false;

            // Show popup logic
            const showPopup = (e) => {
                if (e) e.preventDefault(); // Prevent default if triggered by link click
                if (isShown) return;

                isShown = true;
                popup.classList.remove("hidden");
                popup.classList.add("flex");
                
                setTimeout(() => {
                    popup.classList.remove("opacity-0");
                    popup.classList.add("opacity-100");
                    popupCard.classList.remove("scale-95");
                    popupCard.classList.add("scale-100");
                }, 50);

                document.body.style.overflow = "hidden";
                window.removeEventListener("scroll", onScroll);
            };

            // Scroll trigger logic
            const onScroll = () => {
                if (!isShown && window.scrollY > 50 && window.innerWidth >= 768) {
                    showPopup();
                }
            };

            window.addEventListener("scroll", onScroll);

            // Trigger popup manually via Auth buttons
            document.querySelectorAll('.auth-trigger').forEach(btn => {
                btn.addEventListener('click', showPopup);
            });

            // --- Form Switching Logic ---
            const showEmailFormBtn = document.getElementById("showEmailFormBtn");
            const goBackBtn = document.getElementById("goBackBtn");
            const authOptionsView = document.getElementById("authOptionsView");
            const emailFormView = document.getElementById("emailFormView");

            showEmailFormBtn.addEventListener("click", () => {
                authOptionsView.classList.add("hidden");
                emailFormView.classList.remove("hidden");
                emailFormView.classList.add("flex");
            });

            goBackBtn.addEventListener("click", () => {
                emailFormView.classList.add("hidden");
                emailFormView.classList.remove("flex");
                authOptionsView.classList.remove("hidden");
            });

            // --- Restrict '@' Symbol in Email Input ---
            // Prevent typing '@' directly
            emailInput.addEventListener("keydown", (e) => {
                if (e.key === "@") {
                    e.preventDefault();
                }
            });

            // Prevent pasting or dragging '@' into the field
            emailInput.addEventListener("input", function() {
                if (this.value.includes("@")) {
                    this.value = this.value.replace(/@/g, "");
                }
            });

            // --- Regex Validation Logic ---
            const usernameInput = document.getElementById("usernameInput");
            const passwordInput = document.getElementById("passwordInput");
            const confirmPasswordInput = document.getElementById("confirmPasswordInput");
            const submitSignUpBtn = document.getElementById("submitSignUpBtn");

            const emailError = document.getElementById("emailError");
            const usernameError = document.getElementById("usernameError");
            const passwordError = document.getElementById("passwordError");
            const confirmPasswordError = document.getElementById("confirmPasswordError");

            // Email with @ requirement (will always fail since @ is blocked)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            // Min 8 chars, at least 1 uppercase, at least 1 letter, at least 1 number, at least 1 special char
            const passwordRegex = /^(?=.*[a-zA-Z])(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z0-9\s]).{8,}$/;

            let isFormSubmitted = false;

            function validateForm() {
                const isEmailValid = emailRegex.test(emailInput.value.trim());
                const isUsernameValid = usernameInput.value.trim().length > 0;
                const isPasswordValid = passwordRegex.test(passwordInput.value);
                const isConfirmPasswordValid = confirmPasswordInput.value === passwordInput.value && confirmPasswordInput.value.length > 0;

                // Show/hide errors only if field is filled or user tried to submit
                if (isFormSubmitted || emailInput.value.length > 0) {
                    emailError.classList.toggle("show", !isEmailValid);
                }
                if (isFormSubmitted || usernameInput.value.length > 0) {
                    usernameError.classList.toggle("show", !isUsernameValid);
                }
                if (isFormSubmitted || passwordInput.value.length > 0) {
                    passwordError.classList.toggle("show", !isPasswordValid);
                }
                if (isFormSubmitted || confirmPasswordInput.value.length > 0) {
                    confirmPasswordError.classList.toggle("show", !isConfirmPasswordValid);
                }

                return isEmailValid && isUsernameValid && isPasswordValid && isConfirmPasswordValid;
            }

            // Validate on input typing
            [emailInput, usernameInput, passwordInput, confirmPasswordInput].forEach(input => {
                input.addEventListener("input", () => {
                    if (isFormSubmitted || input.value.length > 0) {
                        validateForm();
                    }
                });
            });

            // Submit click validation
            submitSignUpBtn.addEventListener("click", (e) => {
                isFormSubmitted = true;
                
                if (validateForm()) {
                    // Placeholder action for successful validation
                    submitSignUpBtn.innerText = "Success!";
                    submitSignUpBtn.classList.remove("bg-banklessRed", "hover:bg-[#c91b26]");
                    submitSignUpBtn.classList.add("bg-green-500", "hover:bg-green-600");
                } else {
                    submitSignUpBtn.innerText = "Complete Sign Up";
                    submitSignUpBtn.classList.add("bg-banklessRed", "hover:bg-[#c91b26]");
                    submitSignUpBtn.classList.remove("bg-green-500", "hover:bg-green-600");
                }
            });
        });
    </script>

</body>
</html>
</textarea>

    <!-- Скрипт генерации файла -->
    <script>
        document.getElementById('generateBtn').addEventListener('click', () => {
            const title = document.getElementById('inputTitle').value.trim();
            const googleLink = document.getElementById('inputGoogleLink').value.trim();

            if (!title || !googleLink) {
                alert('Пожалуйста, заполните оба поля (Заголовок и Ссылка Google)');
                return;
            }

            // Создаем slug для URL из заголовка
            // Например: "The Automated Nexus!" -> "the-automated-nexus"
            const slug = title.toLowerCase()
                              .replace(/[^a-z0-9\s-]/g, '')
                              .trim()
                              .replace(/\s+/g, '-');

            // Берем сырой текст шаблона
            let templateContent = document.getElementById('site-template').value;

            // Заменяем плейсхолдеры
            // Регулярные выражения /.../g нужны, чтобы заменить ВСЕ вхождения, если их несколько
            templateContent = templateContent.replace(/\{\{TITLE\}\}/g, title);
            templateContent = templateContent.replace(/\{\{SLUG\}\}/g, slug);
            templateContent = templateContent.replace(/\{\{GOOGLE_LINK\}\}/g, googleLink);

            // Создаем Blob (виртуальный файл) и скачиваем
            const blob = new Blob([templateContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html'; // Имя сохраняемого файла
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>

</body>
